<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aviation Weather</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; color: #333; max-width: 900px; margin: 0 auto; padding: 20px; background-color: #fff; }
        h2 { text-align: center; font-weight: normal; border-bottom: 2px solid #0078D4; padding-bottom: 15px; margin-bottom: 20px; letter-spacing: 1px; color: #0078D4; }
        .search-container { display: flex; gap: 15px; justify-content: center; align-items: center; margin-bottom: 30px; flex-wrap: wrap; background: #f8f9fa; padding: 15px; border-radius: 8px; }
        input[type="text"] { padding: 10px; font-size: 16px; border: 1px solid #ccc; width: 30%; text-transform: uppercase; outline: none; }
        input[type="text"]:focus { border-color: #0078D4; }
        button { padding: 10px 20px; font-size: 16px; background-color: #0078D4; color: white; border: none; cursor: pointer; border-radius: 4px; }
        button:hover { background-color: #005a9e; }
        .btn-pdf { background-color: #28a745; }
        .btn-pdf:hover { background-color: #218838; }
        
        .options-group { display: flex; flex-direction: column; gap: 5px; }
        .pdf-option { font-size: 13px; display: flex; align-items: center; gap: 5px; cursor: pointer; color: #555; }
        
        .card { border-left: 4px solid #0078D4; border-top: 1px solid #eee; border-right: 1px solid #eee; border-bottom: 1px solid #eee; padding: 20px; margin-bottom: 20px; border-radius: 0 4px 4px 0; }
        .card h3 { display: flex; align-items: center; margin: 0 0 15px 0; font-size: 20px; color: #0078D4; border-bottom: 1px dashed #eee; padding-bottom: 10px; }
        .checkbox-group { margin-left: auto; font-size: 14px; font-weight: normal; color: #333; }
        .checkbox-group label { cursor: pointer; margin-left: 15px; }

        .data-section { margin-bottom: 15px; }
        .data-label { font-weight: bold; font-size: 14px; margin-bottom: 5px; color: #0078D4; }
        .jst-time { font-size: 12px; color: #777; font-weight: normal; margin-left: 10px; }
        
        .raw-text { font-family: 'Courier New', Courier, monospace; background-color: #f9f9f9; padding: 12px; border: 1px solid #eee; white-space: pre-wrap; word-wrap: break-word; font-size: 15px; line-height: 1.4; }
        
        .msg-none { color: #777; font-style: italic; }
        .loading { text-align: center; color: #0078D4; font-weight: bold; }
    </style>
</head>
<body>

    <h2>METAR / TAF</h2>
    <div class="search-container">
        <input type="text" id="icao" placeholder="ICAO (RJTT RJAA...)" oninput="saveToLocal()">
        <button onclick="fetchWeather()">Search</button>
        <button onclick="downloadPDF()" class="btn-pdf">Download PDF</button>
        
        <div class="options-group">
            <label class="pdf-option">
                <input type="checkbox" id="include-jst-pdf" checked> JST時刻を併記
            </label>
            <label class="pdf-option">
                <input type="checkbox" id="include-vfr-pdf"> VMC or IMCを表記
            </label>
        </div>
    </div>
    
    <div id="result"></div>

    <script>
        function saveToLocal() {
            localStorage.setItem('savedIcaoCodes', document.getElementById('icao').value);
        }

        window.onload = function() {
            const savedVal = localStorage.getItem('savedIcaoCodes');
            if (savedVal) {
                document.getElementById('icao').value = savedVal;
                fetchWeather();
            }
        };

        async function safeFetchJson(url) {
            try {
                const res = await fetch(url);
                if (res.status === 204 || !res.ok) return { error: true };
                return await res.json();
            } catch (e) { return { error: true }; }
        }

        function formatTaf(text) {
            const keywords = ['TEMPO', 'BECMG', 'FM', 'PROB', 'INTER'];
            let formatted = text;
            keywords.forEach(key => {
                const regex = new RegExp(`\\s(${key})`, 'g');
                formatted = formatted.replace(regex, '\n  $1');
            });
            return formatted;
        }

        function convertToJST(rawText) {
            if (!rawText) return "";
            const match = rawText.match(/\b(\d{2})(\d{2})(\d{2})Z\b/);
            if (match) {
                let d = new Date();
                let targetDay = parseInt(match[1], 10);
                if (targetDay > d.getUTCDate() + 15) d.setUTCMonth(d.getUTCMonth() - 1);
                d.setUTCDate(targetDay);
                d.setUTCHours(parseInt(match[2], 10));
                d.setUTCMinutes(parseInt(match[3], 10));
                return `<span class="jst-time">(JST : ${d.getDate().toString().padStart(2, '0')}日 ${d.getHours().toString().padStart(2, '0')}:${d.getMinutes().toString().padStart(2, '0')}発行)</span>`;
            }
            return "";
        }

        async function fetchWeather() {
            const inputVal = document.getElementById('icao').value.toUpperCase();
            const icaos = inputVal.split(/[\s,]+/).filter(Boolean); 
            const resultDiv = document.getElementById('result');
            if(icaos.length === 0) { resultDiv.innerHTML = ''; return; }

            resultDiv.innerHTML = '<p class="loading">Loading...</p>';
            let htmlOutput = '';

            for (const icao of icaos) {
                const metarUrl = `https://weather-api-proxy.bbfn2187.workers.dev/?icao=${icao}&type=metar`;
                const tafUrl   = `https://weather-api-proxy.bbfn2187.workers.dev/?icao=${icao}&type=taf`;
                const [metarData, tafData] = await Promise.all([safeFetchJson(metarUrl), safeFetchJson(tafUrl)]);

                let hasMetar = !metarData.error && metarData.raw;
                let hasTaf = !tafData.error && tafData.raw;

                htmlOutput += `
                    <div class="card">
                        <h3>${icao}
                            <div class="checkbox-group">
                                <label><input type="checkbox" class="pdf-cb" value="metar-${icao}" data-icao="${icao}" data-type="METAR"> METAR</label>
                                <label><input type="checkbox" class="pdf-cb" value="taf-${icao}" data-icao="${icao}" data-type="TAF"> TAF</label>
                            </div>
                        </h3>
                        <div class="data-section">
                            <div class="data-label">METAR ${hasMetar ? convertToJST(metarData.raw) : ''}</div>
                            <div class="raw-text" id="raw-metar-${icao}">${hasMetar ? metarData.raw : '<span class="msg-none">現在有効なMETARがありません</span>'}</div>
                        </div>
                        <div class="data-section">
                            <div class="data-label">TAF ${hasTaf ? convertToJST(tafData.raw) : ''}</div>
                            <div class="raw-text" id="raw-taf-${icao}">${hasTaf ? formatTaf(tafData.raw) : '<span class="msg-none">TAFは発行されていません</span>'}</div>
                        </div>
                    </div>
                `;
            }
            resultDiv.innerHTML = htmlOutput;
        }

        function parseToJstObj(dayStr, hourStr, minStr = "00") {
            let d = new Date();
            let targetDay = parseInt(dayStr, 10);
            if (targetDay > d.getUTCDate() + 15) d.setUTCMonth(d.getUTCMonth() - 1);
            d.setUTCDate(targetDay);
            d.setUTCHours(parseInt(hourStr, 10));
            d.setUTCMinutes(parseInt(minStr, 10));
            return { day: d.getDate(), hour: d.getHours(), min: d.getMinutes().toString().padStart(2, '0') };
        }

        // VMC or IMC 判定ロジック
        function judgeFlightCategory(metar) {
            if (!metar || metar.includes("ありません")) return null;
            if (metar.includes("CAVOK")) return { label: "VMC", color: [0, 128, 0] }; // Green

            // 1. 視程チェック (4桁数字を探す)
            const visMatch = metar.match(/\b(\d{4})\b/);
            if (visMatch) {
                const vis = parseInt(visMatch[1], 10);
                if (vis < 5000) return { label: "IMC", color: [220, 53, 69] }; // Red
            }

            // 2. 雲層チェック (BKN or OVC + 3桁数字)
            const cloudMatches = metar.matchAll(/\b(BKN|OVC)(\d{3})\b/g);
            for (const match of cloudMatches) {
                const height = parseInt(match[2], 10);
                if (height < 10) return { label: "IMC", color: [220, 53, 69] }; // Red
            }

            return { label: "VMC", color: [0, 128, 0] }; // Green
        }

        function downloadPDF() {
            const checkboxes = document.querySelectorAll('.pdf-cb:checked');
            if (checkboxes.length === 0) { alert("出力するデータにチェックを入れてください。"); return; }

            const includeJst = document.getElementById('include-jst-pdf').checked;
            const includeVfr = document.getElementById('include-vfr-pdf').checked;

            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('landscape', 'pt', 'a4');
            const margin = 40;
            const lineHeight = 16;
            const pageHeight = doc.internal.pageSize.height;
            const jstAlignX = 420; 

            let y = margin;
            let hasValidData = false;

            checkboxes.forEach(cb => {
                const id = cb.value;
                const type = cb.getAttribute('data-type');
                const icao = cb.getAttribute('data-icao');
                const textEl = document.getElementById(`raw-${id}`);
                
                if (textEl) {
                    let text = textEl.innerText;
                    if (text.includes("ありません") || text.includes("されていません")) return;
                    hasValidData = true;

                    if (y > pageHeight - margin - 30) { doc.addPage(); y = margin; }

                    doc.setFont("helvetica", "bold").setFontSize(12).setTextColor(0, 120, 212);
                    doc.text(`${icao} ${type}`, margin, y);
                    doc.setTextColor(0, 0, 0); // Reset color

                    if (includeJst) {
                        let subHeaderText = "";
                        const issueMatch = text.match(/\b(\d{2})(\d{2})(\d{2})Z\b/);
                        if (issueMatch) {
                            let t = parseToJstObj(issueMatch[1], issueMatch[2], issueMatch[3]);
                            subHeaderText = `(${t.day} ${t.hour}:${t.min} JST Issued)`;
                        }
                        if (subHeaderText) {
                            doc.setFont("helvetica", "normal").setFontSize(9);
                            doc.text(subHeaderText, margin + 120, y);
                        }
                    }

                    y += lineHeight + 5;
                    const lines = text.split('\n');
                    lines.forEach((rawLine, index) => {
                        if (y > pageHeight - margin) { doc.addPage(); y = margin; }

                        // Rawデータ本体
                        doc.setFont("courier", "normal").setFontSize(13).setTextColor(0, 0, 0);
                        doc.text(rawLine, margin, y);

                        // VMC/IMC 表示 (METARのみ、かつ1行目の末尾)
                        if (includeVfr && type === 'METAR' && index === 0) {
                            const result = judgeFlightCategory(rawLine);
                            if (result) {
                                // 行の長さを取得して、その少し後ろに描画
                                const textWidth = doc.getTextWidth(rawLine);
                                doc.setFont("helvetica", "bold").setFontSize(13);
                                doc.setTextColor(result.color[0], result.color[1], result.color[2]);
                                doc.text(`  [${result.label}]`, margin + textWidth, y);
                                doc.setTextColor(0, 0, 0); // 戻す
                            }
                        }

                        // JST時間併記
                        if (includeJst && type === 'TAF' && index > 0) {
                            let jstInfo = "";
                            const periodMatch = rawLine.match(/\b(\d{2})(\d{2})\/(\d{2})(\d{2})\b/);
                            if (periodMatch) {
                                let start = parseToJstObj(periodMatch[1], periodMatch[2]);
                                let end = parseToJstObj(periodMatch[3], periodMatch[4]);
                                jstInfo = `(${start.day} ${start.hour}:${start.min} ~ ${end.day} ${end.hour}:${end.min} JST)`;
                            } else {
                                const fmMatch = rawLine.match(/\bFM(\d{2})(\d{2})(\d{2})\b/);
                                if (fmMatch) {
                                    let start = parseToJstObj(fmMatch[1], fmMatch[2], fmMatch[3]);
                                    jstInfo = `(${start.day} ${start.hour}:${start.min} JST~)`;
                                }
                            }
                            if (jstInfo) {
                                doc.setFont("helvetica", "normal").setFontSize(9);
                                doc.text(jstInfo, jstAlignX, y);
                            }
                        }
                        y += lineHeight;
                    });
                    y += 15;
                }
            });
            
            if (hasValidData) doc.save("BriefHub_METARTAF.pdf");
        }
    </script>
</body>
</html>
